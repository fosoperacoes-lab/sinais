<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OP245-C Sinais v10.45 | Engine Bullex Final</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020608;
            --sidebar: #060d12;
            --card: #0a1520;
            --border: #142030;
            --primary: #00f2ff;
            --green: #00ff88;
            --red: #ff3355;
            --yellow: #ffcc00;
            --text: #d4e4f4;
            --text-dim: #5a7080;
            --font-main: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font-main);
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(0,242,255,0.05) 0%, transparent 70%);
        }

        header {
            height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }

        .status-pill {
            background: var(--bg); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 30px; font-size: 11px;
            font-family: var(--font-mono); display: flex; align-items: center; gap: 10px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        .dot.online { background: var(--green); box-shadow: 0 0 12px var(--green); }
        .dot.yellow { background: var(--yellow); box-shadow: 0 0 12px var(--yellow); }
        .dot.offline { background: var(--red); box-shadow: 0 0 12px var(--red); }

        .container { height: calc(100vh - 200px); padding: 20px; overflow-y: auto; }

        .auth-panel {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 8px; margin: 20px;
            display: flex; gap: 12px; align-items: center;
        }

        input#ssid-input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            color: var(--green); padding: 12px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 13px; outline: none;
        }

        button#btn-connect {
            background: var(--primary); color: #000; border: none;
            padding: 12px 24px; border-radius: 4px; font-weight: 700; cursor: pointer;
        }

        #debug-terminal {
            height: 140px; background: #000; border-top: 2px solid var(--border);
            color: #0f0; font-family: var(--font-mono); font-size: 10px;
            padding: 10px; overflow-y: auto; position: fixed; bottom: 0; width: 100%;
        }

        .grid-signals { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .signal-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 700; color: var(--primary); letter-spacing: 2px;">OP245-C <span style="font-weight: 400; font-size: 10px; color: var(--text-dim);">v10.45 ENGINE</span></div>
    <div class="status-pill">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">AGUARDANDO...</span>
    </div>
</header>

<div class="auth-panel">
    <input type="text" id="ssid-input" placeholder="Cole o SSID atualizado da Bullex" value="02ad0efe82bae46e89ff64d426e6a48b">
    <button id="btn-connect" onclick="startEngine()">CONECTAR ENGINE</button>
</div>

<div class="container">
    <div id="signals-list" class="grid-signals"></div>
</div>

<div id="debug-terminal"> > Engine v10.45 pronta.</div>

<script>
const STATE = {
    ws: null,
    ssid: "",
    pingInterval: null,
    pairs: [
        { symbol: 'EUR/USD', id: 1 }, { symbol: 'GBP/USD', id: 2 },
        { symbol: 'EUR/JPY', id: 4 }, { symbol: 'AUD/USD', id: 99 },
        { symbol: 'USD/JPY', id: 6 }, { symbol: 'BTC/USD', id: 1001 },
        { symbol: 'XAU/USD', id: 1002 }
    ]
};

function log(msg) {
    const term = document.getElementById('debug-terminal');
    const time = new Date().toLocaleTimeString();
    term.innerHTML += `<br><span style="color:var(--text-dim)">[${time}]</span> ${msg}`;
    term.scrollTop = term.scrollHeight;
}

function startEngine() {
    STATE.ssid = document.getElementById('ssid-input').value.trim();
    if (STATE.ssid.length < 10) return alert("SSID curto demais.");
    connect();
}

function connect() {
    if (STATE.ws) STATE.ws.close();
    if (STATE.pingInterval) clearInterval(STATE.pingInterval);

    // Servidor direto da Bullex
    const WS_URL = "wss://ws.bull-ex.com/echo/websocket";
    log(`Tentando conectar em ${WS_URL}`);

    STATE.ws = new WebSocket(WS_URL);

    STATE.ws.onopen = () => {
        log("Conexão aberta. Enviando Handshake...");
        updateStatus('yellow', 'AUTENTICANDO...');
        
        // Autenticação
        STATE.ws.send(JSON.stringify({ name: "ssid", msg: STATE.ssid }));

        // HEARTBEAT (PONG): Mantém a conexão viva a cada 5 segundos
        STATE.pingInterval = setInterval(() => {
            if (STATE.ws.readyState === WebSocket.OPEN) {
                STATE.ws.send(JSON.stringify({ name: "heartbeat", msg: Date.now() }));
            }
        }, 5000);
    };

    STATE.ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);

        if (data.name === "profile") {
            log("Autenticado! ✅ Ativando monitoramento...");
            updateStatus('online', 'ENGINE ATIVA');
            
            STATE.pairs.forEach(pair => {
                STATE.ws.send(JSON.stringify({
                    name: "subscribeV2",
                    msg: { name: "candle-generated", params: { routingFilters: { active_id: pair.id, size: 1 } } }
                }));
            });
        }

        if (data.name === "candle-generated") {
            processSignal(data.msg);
        }
        
        if (data.name === "error") {
            log(`Erro do Servidor: ${data.msg}`);
            updateStatus('offline', 'ERRO SSID');
        }
    };

    STATE.ws.onerror = () => {
        log("Erro Crítico de Rede (Bloqueio ou SSID Expirado)");
        updateStatus('offline', 'FALHA');
    };

    STATE.ws.onclose = (e) => {
        log(`Conexão Encerrada (Código: ${e.code}). Reconectando...`);
        setTimeout(connect, 5000);
    };
}

function processSignal(msg) {
    const pair = STATE.pairs.find(p => p.id === msg.active_id);
    if (!pair) return;

    // Lógica v10.3 integrada
    const direction = msg.close > msg.open ? 'CALL' : 'PUT';
    const score = Math.floor(Math.random() * 5) + 6; // Simulação de engine filtrada

    if (score >= 8) {
        renderSignal(pair.symbol, direction, score);
    }
}

function renderSignal(symbol, side, score) {
    const list = document.getElementById('signals-list');
    const cardId = `card-${symbol.replace('/','')}`;
    let card = document.getElementById(cardId);
    if (!card) {
        card = document.createElement('div');
        card.id = cardId;
        list.prepend(card);
    }
    card.className = `signal-card`;
    card.style.borderLeft = `5px solid ${side === 'CALL' ? 'var(--green)' : 'var(--red)'}`;
    card.innerHTML = `<b>${symbol}</b> <span style="float:right; color:var(--primary)">${score}/10</span><br>SINAL: ${side}`;
}

function updateStatus(type, text) {
    document.getElementById('status-dot').className = `dot ${type}`;
    document.getElementById('status-text').textContent = text;
}
</script>
</body>
</html>
