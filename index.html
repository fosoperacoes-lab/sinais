<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OP245-C Sinais v10.25 | Engine Bullex</title>

    <style>
        :root {
            --bg: #020608;
            --card: #080c0e;
            --border: #141a1d;
            --primary: #00f2ff;
            --green: #00ff88;
            --red: #ff3355;
            --text: #e0e6ed;
            --text-dim: #8492a6;
        }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        
        header { 
            background: var(--card); border-bottom: 1px solid var(--border); 
            padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }

        .status-pill { 
            background: #141a1d; border: 1px solid var(--border); 
            padding: 6px 12px; border-radius: 20px; font-size: 11px; 
            display: flex; align-items: center; gap: 8px; 
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .dot.online { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .dot.yellow { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .dot.offline { background: var(--red); }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* Painel de SSID */
        .auth-panel {
            background: #0d1418; border: 1px solid var(--border);
            padding: 15px; border-radius: 8px; margin-bottom: 20px;
            display: flex; gap: 10px; align-items: center;
        }
        input#ssid-input {
            flex: 1; background: #020608; border: 1px solid var(--border);
            color: var(--green); padding: 10px; border-radius: 4px; font-family: monospace;
        }
        button#btn-connect {
            background: var(--primary); border: none; padding: 10px 20px;
            border-radius: 4px; font-weight: bold; cursor: pointer;
        }

        .grid-signals { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .signal-card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 10px; padding: 15px; 
        }
        .buy { border-left: 4px solid var(--green); }
        .sell { border-left: 4px solid var(--red); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--primary);">OP245-C <span style="font-size: 10px; color: var(--text-dim);">v10.25</span></div>
    <div class="status-pill">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">Aguardando SSID...</span>
    </div>
</header>

<div class="container">
    <div class="auth-panel">
        <input type="text" id="ssid-input" placeholder="Cole seu SSID aqui (Application > Cookies > ssid)">
        <button id="btn-connect" onclick="startConnection()">CONECTAR ENGINE</button>
    </div>

    <div id="signals-list" class="grid-signals">
        </div>
</div>

<script>
const STATE = {
    ws: null,
    token: "",
    // Mapeamento expandido para receber TODOS os pares solicitados
    pairs: [
        { symbol: 'EUR/USD', activeId: 1 },
        { symbol: 'GBP/USD', activeId: 2 },
        { symbol: 'EUR/JPY', activeId: 4 },
        { symbol: 'AUD/USD', activeId: 99 },
        { symbol: 'USD/JPY', activeId: 6 },
        { symbol: 'USD/CAD', activeId: 3 },
        { symbol: 'EUR/GBP', activeId: 5 },
        { symbol: 'GBP/JPY', activeId: 3 },
        { symbol: 'AUD/CAD', activeId: 13 },
        { symbol: 'BTC/USD', activeId: 1001 },
        { symbol: 'XAU/USD', activeId: 1002 },
        { symbol: 'ETH/USD', activeId: 1003 }
    ],
    lastSignalTime: {}
};

function startConnection() {
    const input = document.getElementById('ssid-input');
    if (input.value.length < 10) {
        alert("Por favor, cole um SSID válido.");
        return;
    }
    STATE.token = input.value.trim();
    connectBullex();
}

function connectBullex() {
    if (STATE.ws) STATE.ws.close();

    // Endereço oficial de tráfego de dados da Bullex
    const WS_URL = "wss://ws.bull-ex.com/echo/websocket"; 
    STATE.ws = new WebSocket(WS_URL);

    STATE.ws.onopen = () => {
        updateStatus('yellow', 'Autenticando...');
        
        // Passo 1: Enviar SSID primeiro (Handshake obrigatório)
        STATE.ws.send(JSON.stringify({
            name: "ssid",
            msg: STATE.token
        }));
    };

    STATE.ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        // Passo 2: Quando receber o perfil, a conexão está validada
        if (data.name === "profile") {
            updateStatus('online', 'Bullex Conectada ✅');
            
            // Passo 3: Subscrever em TODOS os pares da lista
            STATE.pairs.forEach(pair => {
                STATE.ws.send(JSON.stringify({
                    name: "subscribeV2",
                    msg: { 
                        name: "candle-generated", 
                        params: { routingFilters: { active_id: pair.activeId, size: 1 } } 
                    }
                }));
            });
        }

        // Processamento das velas em tempo real vindas da Bullex
        if (data.name === "candle-generated") {
            handleCandle(data.msg);
        }

        if (data.name === "error") {
            updateStatus('offline', 'Erro de Token/Conexão');
            console.error("Erro Bullex:", data.msg);
        }
    };

    STATE.ws.onclose = () => {
        updateStatus('offline', 'Desconectado. Tentando reconectar...');
        setTimeout(connectBullex, 5000);
    };
}

function handleCandle(msg) {
    const pair = STATE.pairs.find(p => p.activeId === msg.active_id);
    if (!pair) return;

    // AQUI ENTRA SUA LÓGICA DE INDICADORES (v10.3)
    // Exemplo de gatilho para demonstração:
    const score = Math.floor(Math.random() * 10) + 1; // Substituir pela sua Engine
    const side = msg.close > msg.open ? 'CALL' : 'PUT';

    if (score >= 8) {
        displaySignal(pair.symbol, side, score);
    }
}

function displaySignal(symbol, side, score) {
    const container = document.getElementById('signals-list');
    const id = `card-${symbol.replace('/','')}`;
    let card = document.getElementById(id);

    if (!card) {
        card = document.createElement('div');
        card.id = id;
        container.prepend(card);
    }

    card.className = `signal-card ${side === 'CALL' ? 'buy' : 'sell'}`;
    card.innerHTML = `
        <div style="display:flex; justify-content:space-between;">
            <b style="font-size:18px;">${symbol}</b>
            <span style="color:var(--primary)">SCORE: ${score}/10</span>
        </div>
        <div style="margin-top:10px; font-weight:bold; color:${side === 'CALL' ? 'var(--green)' : 'var(--red)'}">
            SINAL DE ${side} DETECTADO
        </div>
        <div style="font-size:11px; color:var(--text-dim); margin-top:5px;">
            Execução via WebSocket Bullex (Sem Delay)
        </div>
    `;
}

function updateStatus(type, text) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    dot.className = `dot ${type}`;
    label.textContent = text;
}
</script>
</body>
</html>
