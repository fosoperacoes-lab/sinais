<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OP245-C Sinais v10.25 | Engine Bullex Final</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020608;
            --sidebar: #060d12;
            --card: #0a1520;
            --border: #142030;
            --primary: #00f2ff;
            --green: #00ff88;
            --red: #ff3355;
            --yellow: #ffcc00;
            --text: #d4e4f4;
            --text-dim: #5a7080;
            --font-main: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(0,242,255,0.05) 0%, transparent 70%);
        }

        header {
            height: 60px;
            background: var(--sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .status-pill {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-family: var(--font-mono);
            display: flex;
            align-items: center; gap: 10px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        .dot.online { background: var(--green); box-shadow: 0 0 12px var(--green); }
        .dot.yellow { background: var(--yellow); box-shadow: 0 0 12px var(--yellow); }
        .dot.offline { background: var(--red); box-shadow: 0 0 12px var(--red); }

        .container {
            height: calc(100vh - 60px);
            padding: 20px;
            overflow-y: auto;
        }

        /* Painel de SSID para Github Pages */
        .auth-panel {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex; gap: 12px;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        input#ssid-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--green);
            padding: 12px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
        }

        input#ssid-input:focus { border-color: var(--primary); }

        button#btn-connect {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        button#btn-connect:hover { filter: brightness(1.2); transform: translateY(-1px); }

        .grid-signals {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .signal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            animation: fadeIn 0.4s ease-out;
        }

        .signal-card.buy { border-top: 4px solid var(--green); }
        .signal-card.sell { border-top: 4px solid var(--red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .pair-title { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
        .score-box { font-family: var(--font-mono); font-size: 12px; color: var(--primary); background: rgba(0,242,255,0.1); padding: 4px 8px; border-radius: 4px; }

        .btn-exec {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-exec.buy { background: var(--green); color: #000; }
        .btn-exec.sell { background: var(--red); color: #000; }

    </style>
</head>
<body>

<header>
    <div style="font-weight: 700; color: var(--primary); letter-spacing: 2px;">OP245-C <span style="font-weight: 400; font-size: 10px; color: var(--text-dim);">v10.25 BULLEX</span></div>
    <div class="status-pill">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">AGUARDANDO SSID...</span>
    </div>
</header>

<div class="container">
    <div class="auth-panel">
        <input type="text" id="ssid-input" placeholder="Insira o SSID da Bullex (Cookies > ssid)">
        <button id="btn-connect" onclick="startEngine()">CONECTAR MOTOR</button>
    </div>

    <div id="signals-list" class="grid-signals">
        </div>
</div>

<script>
const STATE = {
    ws: null,
    ssid: "",
    // Monitoramento expandido conforme solicitado
    pairs: [
        { symbol: 'EUR/USD', id: 1 },
        { symbol: 'GBP/USD', id: 2 },
        { symbol: 'EUR/JPY', id: 4 },
        { symbol: 'AUD/USD', id: 99 },
        { symbol: 'USD/JPY', id: 6 },
        { symbol: 'USD/CAD', id: 3 },
        { symbol: 'EUR/GBP', id: 5 },
        { symbol: 'GBP/JPY', id: 3 },
        { symbol: 'AUD/CAD', id: 13 },
        { symbol: 'BTC/USD', id: 1001 },
        { symbol: 'XAU/USD', id: 1002 },
        { symbol: 'ETH/USD', id: 1003 }
    ],
    activeSignals: new Set()
};

function startEngine() {
    const input = document.getElementById('ssid-input');
    if (input.value.length < 10) {
        alert("Erro: O SSID inserido parece ser inválido.");
        return;
    }
    STATE.ssid = input.value.trim();
    connect();
}

function connect() {
    if (STATE.ws) STATE.ws.close();

    // Servidor de WebSocket para tráfego Bullex
    const URL = "wss://ws.bull-ex.com/echo/websocket";
    STATE.ws = new WebSocket(URL);

    STATE.ws.onopen = () => {
        updateStatus('yellow', 'AUTENTICANDO...');
        
        // Handshake inicial: Envio do SSID
        STATE.ws.send(JSON.stringify({
            name: "ssid",
            msg: STATE.ssid
        }));
    };

    STATE.ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);

        // Confirmação de perfil = Conexão Autorizada
        if (data.name === "profile") {
            updateStatus('online', 'MOTOR ONLINE ✅');
            
            // Subscreve em todos os pares da lista
            STATE.pairs.forEach(pair => {
                STATE.ws.send(JSON.stringify({
                    name: "subscribeV2",
                    msg: { 
                        name: "candle-generated", 
                        params: { routingFilters: { active_id: pair.id, size: 1 } } 
                    }
                }));
            });
        }

        // Recebimento de velas em tempo real
        if (data.name === "candle-generated") {
            processData(data.msg);
        }

        if (data.name === "error") {
            console.error("[ERRO BULLEX]", data.msg);
            updateStatus('offline', 'ERRO: SSID INVÁLIDO');
        }
    };

    STATE.ws.onclose = () => {
        updateStatus('offline', 'RECONECTANDO...');
        setTimeout(connect, 5000);
    };
}

function processData(msg) {
    const pair = STATE.pairs.find(p => p.id === msg.active_id);
    if (!pair) return;

    // LÓGICA DE SCORE OP245-C v10.25
    // Integrar aqui suas funções de MACD, Stoch e RSI
    const mockScore = Math.floor(Math.random() * 10) + 1;
    const direction = msg.close > msg.open ? 'CALL' : 'PUT';

    if (mockScore >= 8) {
        renderCard(pair.symbol, direction, mockScore);
    }
}

function renderCard(symbol, side, score) {
    const list = document.getElementById('signals-list');
    const cardId = `card-${symbol.replace('/','')}`;
    let card = document.getElementById(cardId);

    if (!card) {
        card = document.createElement('div');
        card.id = cardId;
        list.prepend(card);
    }

    card.className = `signal-card ${side === 'CALL' ? 'buy' : 'sell'}`;
    card.innerHTML = `
        <div class="card-header">
            <span class="pair-title">${symbol}</span>
            <span class="score-box">CONFIDÊNCIA: ${score}/10</span>
        </div>
        <div style="font-size: 13px; color: var(--text-dim); margin-bottom: 5px;">Sinal detectado via Bullex Stream</div>
        <div style="font-weight: 700; color: ${side === 'CALL' ? 'var(--green)' : 'var(--red)'};">
            ENTRADA: ${side} (M1)
        </div>
        <button class="btn-exec ${side === 'CALL' ? 'buy' : 'sell'}">OPERAR AGORA</button>
    `;

    // Remove sinais antigos após 1 minuto para manter a tela limpa
    setTimeout(() => { if(card) card.remove(); }, 60000);
}

function updateStatus(type, text) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    dot.className = `dot ${type}`;
    label.textContent = text;
}
</script>

</body>
</html>
