<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OP245-C Sinais v10.30 | Engine Bullex Debug</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020608;
            --sidebar: #060d12;
            --card: #0a1520;
            --border: #142030;
            --primary: #00f2ff;
            --green: #00ff88;
            --red: #ff3355;
            --yellow: #ffcc00;
            --text: #d4e4f4;
            --text-dim: #5a7080;
            --font-main: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(0,242,255,0.05) 0%, transparent 70%);
        }

        header {
            height: 60px;
            background: var(--sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .status-pill {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-family: var(--font-mono);
            display: flex;
            align-items: center; gap: 10px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        .dot.online { background: var(--green); box-shadow: 0 0 12px var(--green); }
        .dot.yellow { background: var(--yellow); box-shadow: 0 0 12px var(--yellow); }
        .dot.offline { background: var(--red); box-shadow: 0 0 12px var(--red); }

        .container {
            height: calc(100vh - 60px);
            padding: 20px;
            overflow-y: auto;
        }

        .auth-panel {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex; gap: 12px;
            align-items: center;
        }

        input#ssid-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--green);
            padding: 12px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
        }

        button#btn-connect {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
        }

        .grid-signals {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .signal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .signal-card.buy { border-top: 4px solid var(--green); }
        .signal-card.sell { border-top: 4px solid var(--red); }

        .pair-title { font-size: 18px; font-weight: 700; }
        .score-box { font-family: var(--font-mono); font-size: 12px; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 700; color: var(--primary); letter-spacing: 2px;">OP245-C <span style="font-weight: 400; font-size: 10px; color: var(--text-dim);">v10.30 DEBUG</span></div>
    <div class="status-pill">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">AGUARDANDO SSID...</span>
    </div>
</header>

<div class="container">
    <div class="auth-panel">
        <input type="text" id="ssid-input" value="02ad0efe82bae46e89ff64d426e6a48b">
        <button id="btn-connect" onclick="startEngine()">CONECTAR MOTOR</button>
    </div>
    <div id="signals-list" class="grid-signals"></div>
</div>

<script>
const STATE = {
    ws: null,
    ssid: "",
    pairs: [
        { symbol: 'EUR/USD', id: 1 }, { symbol: 'GBP/USD', id: 2 },
        { symbol: 'EUR/JPY', id: 4 }, { symbol: 'AUD/USD', id: 99 },
        { symbol: 'USD/JPY', id: 6 }, { symbol: 'USD/CAD', id: 3 },
        { symbol: 'BTC/USD', id: 1001 }, { symbol: 'XAU/USD', id: 1002 }
    ]
};

function startEngine() {
    const input = document.getElementById('ssid-input');
    STATE.ssid = input.value.trim();
    if (STATE.ssid.length < 5) { alert("SSID muito curto."); return; }
    connect();
}

function connect() {
    if (STATE.ws) STATE.ws.close();
    const URL = "wss://ws.bull-ex.com/echo/websocket";
    
    try {
        STATE.ws = new WebSocket(URL);
    } catch (e) {
        console.error("Erro ao criar WS:", e);
        updateStatus('offline', 'ERRO AO CONECTAR');
        return;
    }

    STATE.ws.onopen = () => {
        console.log("[WS >>] Aberto. Autenticando...");
        updateStatus('yellow', 'AUTENTICANDO...');
        STATE.ws.send(JSON.stringify({ name: "ssid", msg: STATE.ssid }));
    };

    STATE.ws.onmessage = (evt) => {
        let data;
        try {
            data = JSON.parse(evt.data);
        } catch (e) {
            console.warn("[WS << RAW]", evt.data);
            return;
        }

        console.log("[WS << JSON]", data);

        if (data.name === "profile" || data.name === "authenticated") {
            updateStatus('online', 'MOTOR ONLINE ✅');
            STATE.pairs.forEach(pair => {
                STATE.ws.send(JSON.stringify({
                    name: "subscribeV2",
                    msg: { 
                        name: "candle-generated", 
                        params: { routingFilters: { active_id: pair.id, size: 1 } } 
                    }
                }));
            });
        } else if (data.name === "candle-generated") {
            processData(data.msg);
        } else if (data.name === "error") {
            console.error("[ERRO BULLEX]", data.msg);
            updateStatus('offline', 'ERRO: SSID INVÁLIDO');
            STATE.ws.close();
        }
    };

    STATE.ws.onclose = (evt) => {
        console.warn("[WS CLOSE]", evt.code);
        if (document.getElementById('status-text').textContent.includes('SSID INVÁLIDO')) return;
        updateStatus('offline', 'RECONECTANDO...');
        setTimeout(connect, 5000);
    };

    STATE.ws.onerror = (err) => {
        console.error("[WS ERRO]", err);
        updateStatus('offline', 'FALHA DE CONEXÃO');
    };
}

function processData(msg) {
    const pair = STATE.pairs.find(p => p.id === msg.active_id || p.id === msg.activeId);
    if (!pair) return;

    const open = msg.open ?? msg.o;
    const close = msg.close ?? msg.c;
    if (open == null || close == null) return;

    const mockScore = Math.floor(Math.random() * 10) + 1;
    const direction = close > open ? 'CALL' : 'PUT';

    if (mockScore >= 8) renderCard(pair.symbol, direction, mockScore);
}

function renderCard(symbol, side, score) {
    const list = document.getElementById('signals-list');
    const cardId = `card-${symbol.replace('/','')}`;
    let card = document.getElementById(cardId);
    if (!card) {
        card = document.createElement('div');
        card.id = cardId;
        list.prepend(card);
    }
    card.className = `signal-card ${side === 'CALL' ? 'buy' : 'sell'}`;
    card.innerHTML = `<div class="pair-title">${symbol}</div><div class="score-box">SCORE: ${score}/10</div><b>${side}</b>`;
    setTimeout(() => card.remove(), 60000);
}

function updateStatus(type, text) {
    document.getElementById('status-dot').className = `dot ${type}`;
    document.getElementById('status-text').textContent = text;
}
</script>
</body>
</html>
